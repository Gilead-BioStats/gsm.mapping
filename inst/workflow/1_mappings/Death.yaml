meta:
  Type: Mapped
  ID: Death
  Description: Death Data Mapping
  Priority: 2
spec:
  Raw_Death:
    studyid:
      type: character
    subjid:
      type: character
    death_dt:
      type: Date
  Mapped_STUDCOMP:
    studyid:
      type: character
    invid:
      type: character
    subjid:
      type: character
    compyn:
      type: character
    compreas:
      type: character
    mincreated_dts:
      type: timestamp
  Mapped_OverallResponse:
    studyid:
      type: character
    subjid:
      type: character
    response_folder:
      type: character
    ovrlresp:
      type: character
    rs_dt:
      type: Date
  Mapped_Randomization:
    studyid:
      type: character
    subjid:
      type: character
    rgmn_dt:
      type: Date
steps:
  - name: dplyr::left_join
    output: Raw_Death_Rand
    params:
      x: Raw_Death
      "y": Mapped_Randomization
      by:
        - studyid
        - subjid
  - name: gsm.core::RunQuery
    output: Temp_Death
    params:
      df: Raw_Death_Rand
      strQuery: "SELECT *, DATEDIFF('day', rgmn_dt, death_dt) as death_days FROM df"
  - name: gsm.core::RunQuery
    output: Temp_Death2
    params:
      df: Temp_Death
      strQuery: "SELECT studyid, subjid, death_dt, death_days FROM df
                WHERE subjid IS NOT NULL AND death_dt IS NOT NULL"
  - name: gsm.core::RunQuery
    output: Temp_Death_Filtered
    params:
      df: Mapped_STUDCOMP
      strQuery: "SELECT studyid, subjid, compreas
                FROM df
                WHERE compreas = 'DEATH'"
  - name: dplyr::full_join
    output: Death_Joined
    params:
      x: Temp_Death_Filtered
      "y": Temp_Death2
      by:
        - studyid
        - subjid
  - name: gsm.core::RunQuery
    output: Death_Joined_Final
    params:
      df: Death_Joined
      strQuery: "SELECT studyid, subjid, death_dt,
                        CASE WHEN death_dt IS NOT NULL THEN 1 ELSE 0 END as death,
                        death_days
                FROM df"
  - name: gsm.core::RunQuery
    output: PD_Data
    params:
      df: Mapped_OverallResponse
      strQuery: "SELECT studyid, subjid, rs_dt as pd_date,
                        ROW_NUMBER() OVER (PARTITION BY subjid ORDER BY rs_dt) as rn
                FROM df
                WHERE ovrlresp = 'PD' AND rs_dt IS NOT NULL"
  - name: gsm.core::RunQuery
    output: PD_Filtered
    params:
      df: PD_Data
      strQuery: "SELECT studyid, subjid, pd_date
                FROM df
                WHERE rn = 1"
  - name: dplyr::full_join
    output: Mapped_Death
    params:
      x: Death_Joined_Final
      "y": PD_Filtered
      by:
        - studyid
        - subjid

